    prerequisites:
      - Node.js and npm
      - Rust toolchain
      - Solana CLI
      - Anchor CLI
      - Funded Solana keypair
      - Kalshi API credentials
      - Kalshi order id
      - Deployed prediction-market program
    required_env_vars:
      - KALSHI_API_KEY_ID
      - KALSHI_PRIVATE_KEY_PATH
      - KALSHI_ORDER_ID
    commands:
      - 'test -d ../sb-on-demand-examples/solana/prediction-market'
