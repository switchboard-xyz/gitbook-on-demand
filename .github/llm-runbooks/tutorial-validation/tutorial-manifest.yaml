schema_version: 1
manifest_name: tutorial-validation
selection_rule: >-
  Curated tutorial-like pages from the published docs tree. Pure landing pages
  and reference-only pages are intentionally excluded unless they contain
  procedural validation surface.
terminal_statuses:
  - pass
  - fail
  - blocked_external_prereq
  - not_applicable
default_execution_order:
  - static_consistency
  - full_exec
  - exec_if_prereqs_present
  - manual_external
  - infra_heavy
entries:
  - id: quick-start
    title: Quick Start
    doc_path: quick-start.md
    group: core
    validation_mode: static_consistency
    source_kind: local_repo
    source_path:
      - quick-start.md
      - docs-by-chain/solana-svm/price-feeds/basic-price-feed.md
      - docs-by-chain/evm/price-feeds/price-feeds-tutorial.md
      - docs-by-chain/solana-svm/randomness/randomness-tutorial.md
      - custom-feeds/build-and-deploy-feed/build-with-typescript.md
    prerequisites: []
    required_env_vars: []
    commands:
      - 'test -f quick-start.md'
      - 'test -f docs-by-chain/solana-svm/price-feeds/basic-price-feed.md'
      - 'test -f docs-by-chain/evm/price-feeds/price-feeds-tutorial.md'
      - 'test -f docs-by-chain/solana-svm/randomness/randomness-tutorial.md'
      - 'rg -n "Quick Start|custom data feed|randomness|Surge" quick-start.md'
    success_checks:
      - Local tutorial links referenced from quick-start exist.
      - Quick-start bullets still point at the current tutorial pages.
    skip_conditions:
      - Never skip; this is a local static check.
    notes:
      - External explorer links are out of scope for pass or fail unless obviously malformed in the doc text.

  - id: solana-basic-price-feed
    title: Solana Basic Price Feed Tutorial
    doc_path: docs-by-chain/solana-svm/price-feeds/basic-price-feed.md
    group: solana
    validation_mode: exec_if_prereqs_present
    source_kind: mixed
    source_path:
      - docs-by-chain/solana-svm/price-feeds/basic-price-feed.md
      - ../sb-on-demand-examples/solana/feeds/basic
    prerequisites:
      - Node.js and npm
      - Rust toolchain
      - Solana CLI
      - Anchor CLI
      - Funded Solana keypair
    required_env_vars: []
    commands:
      - 'test -d ../sb-on-demand-examples/solana/feeds/basic'
      - "jq -r '.scripts.update' ../sb-on-demand-examples/solana/feeds/basic/package.json"
      - '(cd ../sb-on-demand-examples/solana/feeds/basic && npm install && npm run build)'
      - '(cd ../sb-on-demand-examples/solana/feeds/basic && npm run update -- --feedId f01cc150052ba08171863e5920bdce7433e200eb31a8558521b0015a09867630)'
    success_checks:
      - Example package exposes the documented `update` flow.
      - Build succeeds.
      - Runtime update submits the managed update transaction when a funded wallet is available.
      - If the local Anchor program is deployed, the same command should also include the example consumer instruction.
    skip_conditions:
      - Mark blocked_external_prereq if Solana, Anchor, or a funded keypair is unavailable.
      - Mark blocked_external_prereq if `../sb-on-demand-examples` is missing.
    notes:
      - Use the preconfigured program from `Anchor.toml`; do not invent a different flow.

