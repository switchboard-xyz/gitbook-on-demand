    success_checks:
      - Build succeeds.
      - The verification script exists and runs through the documented standalone example flow when Kalshi credentials and a deployed program are available.
    skip_conditions:
      - Mark blocked_external_prereq if Solana, Anchor, a funded keypair, Kalshi credentials, the order id, or a deployed prediction-market program is unavailable.
      - Mark blocked_external_prereq if `../sb-on-demand-examples` is missing.
    notes:
      - `npm test` is only a CLI help smoke test; use `npm run start -- ...` for the credentialed validation flow.

